name: Bug Report
description: Report a bug or unexpected behavior
labels: ["type:bug", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run query '...'
        2. Observe error '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or logs if available.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of BerserkDB is affected?
      options:
        - Engine
        - Query Service
        - Meta Service
        - Ingest / Agent
        - CLI
        - UI
        - Storage
        - Infrastructure
        - Other / Unknown
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version, OS, deployment method, or any relevant environment details.
      placeholder: |
        - BerserkDB version: ...
        - OS: ...
        - Deployment: Docker / bare metal / ...
    validations:
      required: false
