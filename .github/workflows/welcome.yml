name: Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Thanks for opening your first issue! We'll triage this shortly.

            In the meantime, please make sure you've provided all the requested information in the template.
          pr-message: |
            Thanks for your first pull request! A maintainer will review it soon.

            Please make sure all CI checks pass and the PR description is filled out.
