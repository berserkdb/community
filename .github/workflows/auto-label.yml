name: Auto Label

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  auto-label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            const componentToLabel = {
              'Engine': 'area:engine',
              'Query Service': 'area:query',
              'Meta Service': 'area:meta',
              'Ingest / Agent': 'area:ingest',
              'CLI': 'area:cli',
              'UI': 'area:ui',
              'Storage': 'area:storage',
              'Infrastructure': 'area:infra',
            };

            const labels = [];
            for (const [component, label] of Object.entries(componentToLabel)) {
              if (body.includes(component)) {
                labels.push(label);
              }
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels,
              });
            }
