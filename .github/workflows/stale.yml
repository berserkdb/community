name: Stale

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had activity in 60 days. It will be closed in 14 days if no further
            activity occurs. If this is still relevant, please comment or remove
            the stale label.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has not had activity in 30 days. It will be closed in 14 days if no
            further activity occurs.
          stale-issue-label: stale
          stale-pr-label: stale
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 14
          days-before-pr-close: 14
          exempt-issue-labels: "priority:p0-critical,priority:p1-high,status:in-progress"
          exempt-pr-labels: "priority:p0-critical,priority:p1-high,status:in-progress"
