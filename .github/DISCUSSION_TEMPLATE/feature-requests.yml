title: "[Feature] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to see in Berserk.

  - type: textarea
    id: feature
    attributes:
      label: Feature Description
      description: What would you like Berserk to do?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why do you need this? What problem does it solve?
    validations:
      required: true
