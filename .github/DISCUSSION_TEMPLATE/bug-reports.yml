title: "[Bug] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Report a bug you've encountered. For urgent issues, please file an [issue](https://github.com/berserkdb/community/issues/new/choose) instead.

  - type: textarea
    id: what-happened
    attributes:
      label: What Happened
      description: Describe the unexpected behavior.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
    validations:
      required: false
